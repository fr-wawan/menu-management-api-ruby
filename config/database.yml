default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: hungryhub_development

test:
  <<: *default
  database: hungryhub_test

production:
  <<: *default
  database: hungryhub_production
